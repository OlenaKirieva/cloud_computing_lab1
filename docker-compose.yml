version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: todo_db
    volumes:
      - todo-db-data:/var/lib/postgresql/data
    networks:
      - todo-network

  backend:
    build: ./backend
    container_name: backend
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@db:5432/todo_db
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - todo-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db-data: